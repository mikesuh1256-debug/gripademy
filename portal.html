<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그립학원 학부모 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',system-ui,sans-serif;background:#f0f2f7;-webkit-font-smoothing:antialiased;}

/* ── 로그인 ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,#1e2a6d 0%,#19b1c6 100%);}
.login-box{background:#fff;border-radius:24px;padding:44px 36px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.login-logo img{height:72px;object-fit:contain;margin-bottom:12px;}
.login-title{font-size:20px;font-weight:900;color:#1e2a6d;margin-bottom:4px;}
.login-sub{font-size:13px;color:#aaa;margin-bottom:28px;}
.login-box input{width:100%;padding:13px 16px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:10px;outline:none;font-family:inherit;transition:border .15s;}
.login-box input:focus{border-color:#1e2a6d;}
.login-btn{width:100%;padding:14px;background:#1e2a6d;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.login-btn:hover{background:#19b1c6;}
.login-err{color:#ef4444;font-size:13px;margin-top:8px;display:none;}

/* ── 앱 셸 ── */
.app{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:#f0f2f7;position:relative;padding-bottom:70px;}

/* ── 헤더 ── */
.app-header{background:linear-gradient(160deg,#1e2a6d 0%,#19b1c6 100%);padding:0 20px 28px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%;}
.app-header::after{content:'';position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;background:rgba(255,255,255,.04);border-radius:50%;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-top:16px;margin-bottom:20px;position:relative;z-index:1;}
.header-logo{display:flex;align-items:center;gap:8px;}
.header-logo img{height:36px;object-fit:contain;filter:brightness(10);}
.header-logo span{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.3px;}
.header-icons{display:flex;gap:4px;}
.header-icon-btn{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.header-greeting{position:relative;z-index:1;}
.greeting-name{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;}
.greeting-sub{font-size:13px;color:rgba(255,255,255,.7);}
.student-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 14px;margin-top:10px;}
.student-pill span{font-size:13px;font-weight:700;color:#fff;}
.student-pill .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);}

/* ── 메인 메뉴 아이콘 그리드 ── */
.menu-card{background:#fff;border-radius:20px;margin:0 14px;padding:20px 10px;box-shadow:0 2px 16px rgba(0,0,0,.06);position:relative;top:-18px;}
.menu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.menu-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;cursor:pointer;border-radius:12px;transition:background .15s;}
.menu-item:active{background:#f0f2f7;}
.menu-icon{font-size:46px;line-height:1;display:flex;align-items:center;justify-content:center;height:52px;}
.menu-label{font-size:12px;font-weight:700;color:#333;text-align:center;line-height:1.3;}

/* 서브 네비 */
.sub-nav{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;display:flex;overflow-x:auto;padding:10px 14px;gap:8px;z-index:99;scrollbar-width:none;}
.sub-nav::-webkit-scrollbar{display:none;}
.sub-nav-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:700;color:#555;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.sub-nav-btn:active{background:#f0f2f7;}
.sub-nav-btn.active{background:#1e2a6d;color:#fff;border-color:#1e2a6d;}
/* 벨 알림 */
.bell-wrap{position:relative;}
.bell-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:#ef4444;border-radius:50%;display:none;border:1.5px solid rgba(255,255,255,.8);}

/* ── 최신 공지 ── */
.section-wrap{margin:0 14px 14px;margin-top:-8px;}
.section-card{background:#fff;border-radius:20px;padding:18px 18px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:14px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-head h3{font-size:16px;font-weight:800;color:#1a1d23;}
.section-more{font-size:13px;color:#19b1c6;font-weight:700;cursor:pointer;text-decoration:none;}
.notice-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;cursor:pointer;}
.notice-row:last-child{border-bottom:none;}
.notice-cat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.cat-공지{background:#fff3e0;color:#e65100;}
.cat-수업자료{background:#e8f5e9;color:#2e7d32;}
.cat-수상{background:#fff8e1;color:#f57f17;}
.cat-가정통신문{background:#e3f2fd;color:#1565c0;}
.notice-title{font-size:14px;font-weight:600;color:#1a1d23;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice-date{font-size:12px;color:#bbb;flex-shrink:0;}
.notice-n{background:#1e2a6d;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;}

/* ── 하단 네비 ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.06);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;font-family:inherit;}
.nav-btn span.ico{font-size:22px;}
.nav-btn span.lbl{font-size:10px;font-weight:700;color:#aaa;}
.nav-btn.active span.lbl{color:#1e2a6d;}

/* ── MY 페이지 ── */
.page{display:none;}
.page.active{display:block;}
.my-header{background:linear-gradient(160deg,#1e2a6d 0%,#19b1c6 100%);padding:56px 20px 28px;text-align:center;}
.my-header h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;}
.my-header p{font-size:13px;color:rgba(255,255,255,.7);}
.my-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding:14px 14px 0;}
.my-tabs::-webkit-scrollbar{display:none;}
.my-tab{flex-shrink:0;padding:8px 18px;border-radius:20px 20px 0 0;border:none;background:#e9ecf3;font-size:13px;font-weight:700;color:#888;cursor:pointer;font-family:inherit;margin-right:4px;}
.my-tab.active{background:#fff;color:#1e2a6d;}
.my-content{background:#fff;border-radius:0 20px 20px 20px;margin:0 14px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;}
th{padding:9px 10px;background:#f5f5f5;font-size:12px;color:#999;font-weight:700;text-align:left;white-space:nowrap;}
td{padding:10px;font-size:13px;color:#333;border-bottom:1px solid #f5f5f5;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
.grade-badge{display:inline-block;width:28px;height:28px;border-radius:7px;text-align:center;line-height:28px;font-weight:800;font-size:14px;}
.grade-A{background:#e8f5e9;color:#2e7d32;}
.grade-B{background:#e3f2fd;color:#1565c0;}
.grade-C{background:#fff3e0;color:#e65100;}
.att-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.att-present{background:#e8f5e9;color:#2e7d32;}
.att-absent{background:#ffebee;color:#c62828;}
.att-late{background:#fff3e0;color:#e65100;}

/* ── 일정 ── */
.sch-toggle{display:flex;gap:0;border:1.5px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:12px;width:fit-content;}
.sch-toggle button{padding:6px 16px;background:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;color:#999;font-family:inherit;}
.sch-toggle button.active{background:#1e2a6d;color:#fff;}
.sch-cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.sch-cal-nav button{background:none;border:1.5px solid #e0e0e0;border-radius:6px;padding:4px 12px;font-size:15px;cursor:pointer;}
.sch-cal-nav h3{font-size:15px;font-weight:700;color:#1e2a6d;min-width:110px;text-align:center;}
.sch-cal{background:#f8f9fa;border-radius:10px;overflow:hidden;}
.sch-cal-hd{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #eee;}
.sch-cal-hd span{text-align:center;padding:7px 0;font-size:11px;font-weight:700;color:#999;}
.sch-cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.sch-day{border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;min-height:56px;padding:4px 3px;cursor:pointer;background:#fff;}
.sch-day:hover{background:#f0f4ff;}
.sch-day.other{background:#fafafa;}
.sch-day.today .dn{background:#1e2a6d;color:#fff;border-radius:50%;}
.sch-day.sel{background:#eef0fb;}
.dn{font-size:12px;font-weight:600;color:#333;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.sch-day:nth-child(7n+1) .dn{color:#e53935;}
.sch-day:nth-child(7n) .dn{color:#1565c0;}
.sdot{font-size:9px;line-height:1.4;padding:0 2px;border-radius:2px;background:#e8eaf6;color:#1e2a6d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;}
.sel-events{margin-top:10px;background:#f8f9fa;border-radius:8px;padding:12px;}
.sel-events h4{font-size:13px;font-weight:700;color:#1e2a6d;margin-bottom:8px;}
.sel-ev-row{font-size:13px;color:#333;padding:5px 0;border-bottom:1px solid #eee;}
.sel-ev-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo"><img src="assets/images/logo/grip-icon.png" onerror="this.style.display='none'"></div>
    <h1 class="login-title">그립학원</h1>
    <p class="login-sub">학부모 포털에 오신 것을 환영합니다</p>
    <input type="email" id="loginEmail" placeholder="이메일">
    <input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr">이메일 또는 비밀번호를 확인하세요.</p>
  </div>
</div>

<!-- 앱 -->
<div class="app" id="app">

  <!-- ① 홈 페이지 -->
  <div class="page active" id="page-home">

    <!-- 헤더 -->
    <div class="app-header">
      <div class="header-top">
        <div class="header-logo">
          <img src="assets/images/logo/grip-icon.png" onerror="this.style.display='none'">
          <span>그립학원</span>
        </div>
        <div class="header-icons">
          <div class="bell-wrap">
            <button class="header-icon-btn" id="bellBtn" onclick="location.href='chat.html'" title="톡방">🔔</button>
            <div class="bell-dot" id="bellDot"></div>
          </div>
          <button class="header-icon-btn" onclick="doLogout()" title="로그아웃">🚪</button>
        </div>
      </div>
      <div class="header-greeting">
        <div class="greeting-name"><span style="font-weight:500;font-size:16px;opacity:.8;">안녕하세요,</span><br><span id="greetingName">학부모님 👋</span></div>
        <div class="greeting-sub">오늘도 함께 성장하는 하루 되세요</div>
        <div class="student-pill">
          <span id="studentPillName">-</span>
          <div class="dot"></div>
          <span id="studentPillInfo">-</span>
        </div>
      </div>
    </div>

    <!-- 고정 서브 네비 -->
    <div class="sub-nav">
      <button class="sub-nav-btn active" onclick="showPage('home')">🏠 홈</button>
      <button class="sub-nav-btn" onclick="showMyTab('grades')">👤 마이페이지</button>
      <button class="sub-nav-btn" onclick="location.href='board.html'">📢 공지사항</button>
      <button class="sub-nav-btn" onclick="location.href='chat.html'">💬 톡방</button>
      <button class="sub-nav-btn" id="subBlogBtn">📝 블로그</button>
      <button class="sub-nav-btn" id="subYoutubeBtn">▶ 유튜브</button>
    </div>

    <!-- 아이콘 메뉴 카드 -->
    <div class="menu-card">
      <div class="menu-grid">
        <div class="menu-item" onclick="location.href='board.html'">
          <div class="menu-icon">📢</div>
          <span class="menu-label">공지사항</span>
        </div>
        <div class="menu-item" onclick="location.href='chat.html'">
          <div class="menu-icon">💬</div>
          <span class="menu-label">톡방</span>
        </div>
        <div class="menu-item" onclick="location.href='schedule.html'">
          <div class="menu-icon">📅</div>
          <span class="menu-label">학사일정</span>
        </div>
        <div class="menu-item" onclick="location.href='board.html'">
          <div class="menu-icon">📚</div>
          <span class="menu-label">수업자료</span>
        </div>
        <div class="menu-item" onclick="location.href='board.html'">
          <div class="menu-icon">🏆</div>
          <span class="menu-label">수상</span>
        </div>
        <div class="menu-item" onclick="showMyTab('grades')">
          <div class="menu-icon">📊</div>
          <span class="menu-label">성적</span>
        </div>
        <div class="menu-item" onclick="showMyTab('attendance')">
          <div class="menu-icon">📋</div>
          <span class="menu-label">출결</span>
        </div>
        <div class="menu-item" onclick="showPage('my')">
          <div class="menu-icon">👤</div>
          <span class="menu-label">내 정보</span>
        </div>
      </div>
    </div>

    <!-- 최신 공지 -->
    <div class="section-wrap">
      <div class="section-card">
        <div class="section-head">
          <h3>📌 최신 공지</h3>
          <a class="section-more" href="board.html">더보기 ›</a>
        </div>
        <div id="recentPosts">
          <div style="text-align:center;color:#bbb;padding:20px;font-size:13px;">불러오는 중...</div>
        </div>
      </div>

      <!-- 다가오는 일정 -->
      <div class="section-card">
        <div class="section-head">
          <h3>📅 다가오는 일정</h3>
          <a class="section-more" href="schedule.html">더보기 ›</a>
        </div>
        <div id="recentSchedule">
          <div style="text-align:center;color:#bbb;padding:20px;font-size:13px;">불러오는 중...</div>
        </div>
      </div>
    </div>

  </div><!-- /page-home -->

  <!-- ② MY 페이지 -->
  <div class="page" id="page-my">
    <div class="my-header">
      <h2 id="myStudentName">-</h2>
      <p id="myStudentInfo">-</p>
    </div>
    <div class="my-tabs" style="margin-top:-1px;">
      <button class="my-tab active" id="mytab-grades" onclick="switchMyTab('grades')">📊 성적</button>
      <button class="my-tab" id="mytab-attendance" onclick="switchMyTab('attendance')">📋 출결</button>
      <button class="my-tab" id="mytab-attitude" onclick="switchMyTab('attitude')">⭐ 태도</button>
      <button class="my-tab" id="mytab-schedule" onclick="switchMyTab('schedule')">📅 일정</button>
    </div>
    <div class="my-content">
      <!-- 성적 -->
      <div id="mycontent-grades">
        <div style="font-size:14px;font-weight:800;color:#1e2a6d;margin-bottom:10px;">📐 수학</div>
        <div style="overflow-x:auto;"><table><thead><tr><th>날짜</th><th>시험명</th><th>등급</th><th>메모</th></tr></thead><tbody id="mathGrades"><tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr></tbody></table></div>
        <div style="font-size:14px;font-weight:800;color:#00391e;margin:16px 0 10px;">📖 영어</div>
        <div style="overflow-x:auto;"><table><thead><tr><th>날짜</th><th>시험명</th><th>등급</th><th>메모</th></tr></thead><tbody id="engGrades"><tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr></tbody></table></div>
      </div>
      <!-- 출결 -->
      <div id="mycontent-attendance" style="display:none;">
        <div style="overflow-x:auto;"><table><thead><tr><th>날짜</th><th>과목</th><th>출결</th><th>메모</th></tr></thead><tbody id="attendanceList"><tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr></tbody></table></div>
      </div>
      <!-- 태도 -->
      <div id="mycontent-attitude" style="display:none;">
        <div style="overflow-x:auto;"><table><thead><tr><th>날짜</th><th>과목</th><th>등급</th><th>메모</th></tr></thead><tbody id="attitudeList"><tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr></tbody></table></div>
      </div>
      <!-- 일정 -->
      <div id="mycontent-schedule" style="display:none;">
        <div class="sch-toggle">
          <button class="active" onclick="schView('list',this)">≡ 목록</button>
          <button onclick="schView('cal',this)">▦ 캘린더</button>
        </div>
        <div id="schListPortal"></div>
        <div id="schCalPortal" style="display:none;">
          <div class="sch-cal-nav">
            <button onclick="schCalMove(-1)">‹</button>
            <h3 id="schCalTitle"></h3>
            <button onclick="schCalMove(1)">›</button>
          </div>
          <div class="sch-cal"><div class="sch-cal-hd"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="sch-cal-body" id="schCalBody"></div></div>
          <div id="schSelDay"></div>
        </div>
      </div>
    </div>
  </div><!-- /page-my -->

  <!-- 하단 네비 -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')"><span class="ico">🏠</span><span class="lbl">홈</span></button>
    <button class="nav-btn" onclick="location.href='chat.html'"><span class="ico">💬</span><span class="lbl">톡방</span></button>
    <button class="nav-btn" onclick="location.href='board.html'"><span class="ico">📋</span><span class="lbl">게시판</span></button>
    <button class="nav-btn" onclick="location.href='schedule.html'"><span class="ico">📅</span><span class="lbl">일정</span></button>
    <button class="nav-btn" id="nav-my" onclick="showPage('my')"><span class="ico">👤</span><span class="lbl">MY</span></button>
  </div>

</div><!-- /app -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, orderBy, getDocs, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAS9iH2_r33OP3fFazsEk5lcJL-oH0eWbU",
  authDomain: "gripacademyweb1.firebaseapp.com",
  projectId: "gripacademyweb1",
  storageBucket: "gripacademyweb1.firebasestorage.app",
  messagingSenderId: "202451577041",
  appId: "1:202451577041:web:de15134759530143173df0"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentStudentId = null;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists()) { showErr(`계정 미등록 UID: ${user.uid}`); return; }
      const data = userDoc.data();
      if (data.role !== 'parent') { showErr(`학부모 계정 아님`); return; }
      currentStudentId = data.studentId;
      await loadStudentInfo(data.studentId);
      await loadGrades(data.studentId);
      await loadRecentPosts();
      await loadRecentSchedule();
      watchChatUnread(user.uid);
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } catch(e) { showErr('오류: ' + e.message); }
  } else {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

window.doLogin = async () => {
  document.getElementById('loginErr').style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth,
      document.getElementById('loginEmail').value,
      document.getElementById('loginPw').value);
  } catch(e) { showErr('로그인 실패: ' + e.code); }
};
window.doLogout = () => signOut(auth);

function watchChatUnread(uid) {
  const lastSeen = parseInt(localStorage.getItem('chatLastSeen') || '0');
  const q = query(collection(db, 'chatRooms'), where('participantIds', 'array-contains', uid));
  onSnapshot(q, (snap) => {
    const hasUnread = snap.docs.some(d => {
      const t = d.data().lastMessageAt?.seconds * 1000 || 0;
      return t > lastSeen;
    });
    document.getElementById('bellDot').style.display = hasUnread ? 'block' : 'none';
  });
}

async function loadStudentInfo(sid) {
  if (!sid) return;
  const snap = await getDoc(doc(db, 'students', sid));
  if (!snap.exists()) return;
  const d = snap.data();
  const courses = d.courses?.length ? d.courses.map(c => c==='math'?'수학':c==='english'?'영어':c).join('+') : (d.course==='both'?'수학+영어':d.course==='math'?'수학':'영어');
  document.getElementById('greetingName').textContent = `${d.name} 학부모님 👋`;
  document.getElementById('myStudentName').textContent = d.name + ' 학생';
  document.getElementById('studentPillName').textContent = d.name;
  document.getElementById('studentPillInfo').textContent = `${d.grade||''} · ${courses}`;
  document.getElementById('myStudentName').textContent = d.name;
  document.getElementById('myStudentInfo').textContent = `${d.grade||''} · ${d.school||''} · ${courses}`;
}

async function loadGrades(sid) {
  if (!sid) return;
  const snap = await getDocs(query(collection(db,'grades'), where('studentId','==',sid), orderBy('date','desc')));
  const math = [], eng = [];
  snap.forEach(d => {
    const g = d.data();
    const date = g.date?.toDate?.()?.toLocaleDateString('ko-KR') || '-';
    const badge = `<span class="grade-badge grade-${g.grade}">${g.grade}</span>`;
    const row = `<tr><td>${date}</td><td>${g.testName||'-'}</td><td>${badge}</td><td>${g.note||''}</td></tr>`;
    if (g.subject==='math') math.push(row); else eng.push(row);
  });
  document.getElementById('mathGrades').innerHTML = math.length ? math.join('') : '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr>';
  document.getElementById('engGrades').innerHTML  = eng.length  ? eng.join('')  : '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr>';
}

async function loadAttendance(sid) {
  const snap = await getDocs(query(collection(db,'attendance'), where('studentId','==',sid), orderBy('date','desc')));
  const rows = [];
  snap.forEach(d => {
    const g = d.data();
    const date = g.date?.toDate?.()?.toLocaleDateString('ko-KR') || '-';
    const subj = g.subject==='math'?'수학':'영어';
    const badge = g.status==='present'?'<span class="att-badge att-present">출석</span>':g.status==='absent'?'<span class="att-badge att-absent">결석</span>':'<span class="att-badge att-late">지각</span>';
    rows.push(`<tr><td>${date}</td><td>${subj}</td><td>${badge}</td><td>${g.note||''}</td></tr>`);
  });
  document.getElementById('attendanceList').innerHTML = rows.length ? rows.join('') : '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr>';
}

async function loadAttitude(sid) {
  const snap = await getDocs(query(collection(db,'attitude'), where('studentId','==',sid), orderBy('date','desc')));
  const rows = [];
  snap.forEach(d => {
    const g = d.data();
    const date = g.date?.toDate?.()?.toLocaleDateString('ko-KR') || '-';
    const badge = `<span class="grade-badge grade-${g.grade}">${g.grade}</span>`;
    rows.push(`<tr><td>${date}</td><td>${g.subject==='math'?'수학':'영어'}</td><td>${badge}</td><td>${g.note||''}</td></tr>`);
  });
  document.getElementById('attitudeList').innerHTML = rows.length ? rows.join('') : '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;">데이터 없음</td></tr>';
}

async function loadRecentPosts() {
  const snap = await getDocs(query(collection(db,'posts'), orderBy('createdAt','desc'), limit(5)));
  const el = document.getElementById('recentPosts');
  if (snap.empty) { el.innerHTML = '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">게시글 없음</div>'; return; }
  const now = Date.now();
  el.innerHTML = snap.docs.map(d => {
    const p = d.data();
    const ts = p.createdAt?.toDate?.() || new Date();
    const diff = Math.floor((now - ts.getTime())/1000);
    const ago = diff < 86400 ? `${Math.floor(diff/3600)||1}시간 전` : `${Math.floor(diff/86400)}일 전`;
    const isNew = diff < 172800;
    return `<div class="notice-row" onclick="location.href='board.html'">
      <span class="notice-cat cat-${p.category||'공지'}">${p.category||'공지'}</span>
      <span class="notice-title">${p.title||''}</span>
      ${isNew ? '<span class="notice-n">N</span>' : ''}
      <span class="notice-date">${ago}</span>
    </div>`;
  }).join('');
}

async function loadRecentSchedule() {
  const el = document.getElementById('recentSchedule');
  try {
    const res = await fetch('/api/schedule?role=admin');
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) { el.innerHTML = '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">일정 없음</div>'; return; }
    const today = new Date(); today.setHours(0,0,0,0);
    const upcoming = data.filter(s => new Date(s.date.start) >= today).slice(0,4);
    el.innerHTML = upcoming.map(s => {
      const d = new Date(s.date.start);
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;">
        <span style="min-width:44px;font-size:12px;font-weight:700;color:#1e2a6d;flex-shrink:0;">${d.getMonth()+1}/${d.getDate()}</span>
        <span style="font-size:13px;color:#333;">${s.title}</span>
      </div>`;
    }).join('') || '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">예정된 일정 없음</div>';
  } catch { el.innerHTML = '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">불러올 수 없음</div>'; }
}

// 페이지 전환
window.showPage = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (page === 'home') document.getElementById('nav-home').classList.add('active');
  if (page === 'my')   document.getElementById('nav-my').classList.add('active');
};

window.showMyTab = (tab) => {
  showPage('my');
  switchMyTab(tab);
};

window.switchMyTab = async (tab) => {
  document.querySelectorAll('.my-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[id^="mycontent-"]').forEach(el => el.style.display = 'none');
  document.getElementById(`mytab-${tab}`).classList.add('active');
  document.getElementById(`mycontent-${tab}`).style.display = 'block';
  if (tab === 'attendance' && currentStudentId) await loadAttendance(currentStudentId);
  if (tab === 'attitude'   && currentStudentId) await loadAttitude(currentStudentId);
  if (tab === 'schedule') await loadScheduleData();
};

// 일정
let schData = [], schY = new Date().getFullYear(), schM = new Date().getMonth(), schSel = null;
const schToday = new Date(); schToday.setHours(0,0,0,0);

async function loadScheduleData() {
  document.getElementById('schListPortal').innerHTML = '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px;">불러오는 중...</div>';
  try {
    const res = await fetch('/api/schedule?role=admin');
    schData = await res.json();
    renderSchList();
  } catch { document.getElementById('schListPortal').innerHTML = '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">불러올 수 없습니다.</div>'; }
}

function renderSchList() {
  const el = document.getElementById('schListPortal');
  if (!schData.length) { el.innerHTML = '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px;">일정 없음</div>'; return; }
  const groups = {};
  schData.forEach(s => { const d = new Date(s.date.start); const k = `${d.getFullYear()}년 ${d.getMonth()+1}월`; if (!groups[k]) groups[k]=[]; groups[k].push(s); });
  el.innerHTML = Object.entries(groups).map(([m, its]) =>
    `<div style="font-size:12px;font-weight:700;color:#1e2a6d;margin:12px 0 6px;">${m}</div>` +
    its.map(s => `<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5;">
      <span style="min-width:44px;font-size:12px;font-weight:700;color:#1e2a6d;">${new Date(s.date.start).getMonth()+1}/${new Date(s.date.start).getDate()}</span>
      <span style="font-size:13px;color:#222;">${s.title}</span>
    </div>`).join('')
  ).join('');
}

function renderSchCal() {
  document.getElementById('schCalTitle').textContent = `${schY}년 ${schM+1}월`;
  const evMap = {};
  schData.forEach(s => {
    const s1 = new Date(s.date.start), s2 = s.date.end ? new Date(s.date.end) : new Date(s1);
    for (let d = new Date(s1); d <= s2; d.setDate(d.getDate()+1)) {
      const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if (!evMap[k]) evMap[k]=[];
      evMap[k].push(s);
    }
  });
  const fd = new Date(schY,schM,1).getDay(), dim = new Date(schY,schM+1,0).getDate(), dp = new Date(schY,schM,0).getDate();
  let html = '';
  for (let i = fd-1; i >= 0; i--) html += `<div class="sch-day other"><div class="dn">${dp-i}</div></div>`;
  for (let d = 1; d <= dim; d++) {
    const isT = schToday.getFullYear()===schY && schToday.getMonth()===schM && schToday.getDate()===d;
    const isS = schSel?.d===d;
    const evs = evMap[`${schY}-${schM}-${d}`] || [];
    html += `<div class="sch-day${isT?' today':''}${isS?' sel':''}" onclick="schSelectDay(${schY},${schM},${d})"><div class="dn">${d}</div>${evs.slice(0,2).map(e=>`<div class="sdot">${e.title}</div>`).join('')}</div>`;
  }
  const rem = (fd+dim)%7; if (rem) for (let d = 1; d <= 7-rem; d++) html += `<div class="sch-day other"><div class="dn">${d}</div></div>`;
  document.getElementById('schCalBody').innerHTML = html;
}

window.schView = (v, btn) => {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('schListPortal').style.display = v==='list' ? 'block' : 'none';
  document.getElementById('schCalPortal').style.display = v==='cal' ? 'block' : 'none';
  if (v==='cal') renderSchCal();
};

window.schCalMove = (dir) => {
  schM += dir;
  if (schM < 0) { schM = 11; schY--; }
  if (schM > 11) { schM = 0; schY++; }
  schSel = null;
  document.getElementById('schSelDay').innerHTML = '';
  renderSchCal();
};

window.schSelectDay = (y, m, d) => {
  schSel = {y,m,d};
  renderSchCal();
  const sel = new Date(y,m,d); sel.setHours(0,0,0,0);
  const evs = schData.filter(s => {
    const s1 = new Date(s.date.start); s1.setHours(0,0,0,0);
    const s2 = s.date.end ? new Date(s.date.end) : new Date(s1); s2.setHours(0,0,0,0);
    return sel >= s1 && sel <= s2;
  });
  document.getElementById('schSelDay').innerHTML = evs.length
    ? `<div class="sel-events"><h4>${m+1}월 ${d}일</h4>${evs.map(e=>`<div class="sel-ev-row">📌 ${e.title}</div>`).join('')}</div>` : '';
};
</script>
