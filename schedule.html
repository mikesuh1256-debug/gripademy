<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그립학원 학사일정</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f2f5;min-height:100vh;}

.header{background:#1e2a6d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.header h1{color:#fff;font-size:17px;font-weight:700;}
.header a{color:rgba(255,255,255,0.7);font-size:13px;text-decoration:none;}

.body{max-width:960px;margin:0 auto;padding:24px 16px;}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.tab-row{display:flex;gap:0;border:1.5px solid #e0e0e0;border-radius:10px;overflow:hidden;background:#fff;}
.tab-btn{padding:8px 20px;background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;color:#999;font-family:inherit;border-right:1px solid #e0e0e0;}
.tab-btn:last-child{border-right:none;}
.tab-btn.active{background:#1e2a6d;color:#fff;}

.view-toggle{display:flex;gap:0;border:1.5px solid #e0e0e0;border-radius:10px;overflow:hidden;}
.view-btn{padding:7px 16px;background:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;color:#999;font-family:inherit;}
.view-btn.active{background:#1e2a6d;color:#fff;}

/* 목록 뷰 - 분리형 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.section-head{font-size:14px;font-weight:800;padding:8px 16px;border-radius:10px;margin-bottom:12px;}
.section-head.math{background:#e3f2fd;color:#1565c0;}
.section-head.eng{background:#e8f5e9;color:#2e7d32;}
.section-head.all{background:#e8eaf6;color:#1e2a6d;}

.month-label{font-size:12px;font-weight:700;color:#999;margin:12px 0 6px;padding-left:4px;}
.schedule-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 6px rgba(0,0,0,0.05);display:flex;align-items:flex-start;gap:12px;}
.date-box{min-width:44px;text-align:center;background:#f5f5f5;border-radius:6px;padding:5px 3px;flex-shrink:0;}
.date-box .day{font-size:18px;font-weight:800;color:#1e2a6d;line-height:1;}
.date-box .mon{font-size:10px;color:#999;}
.date-box .range{font-size:9px;color:#bbb;}
.schedule-info .title{font-size:13px;font-weight:700;color:#222;margin-bottom:4px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.tag-수학학부모{background:#e3f2fd;color:#1565c0;}
.tag-영어학부모{background:#e8f5e9;color:#2e7d32;}
.tag-전체학원{background:#f3e5f5;color:#6a1b9a;}
.tag-cat{background:#fff3e0;color:#e65100;}
.empty-section{text-align:center;padding:30px;color:#bbb;font-size:13px;}

/* 캘린더 */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;}
.cal-nav button{background:none;border:1.5px solid #e0e0e0;border-radius:8px;padding:6px 14px;font-size:16px;cursor:pointer;}
.cal-nav h2{font-size:17px;font-weight:700;color:#1e2a6d;min-width:120px;text-align:center;}
.calendar{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:20px;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #f0f0f0;}
.cal-header span{text-align:center;padding:10px 0;font-size:12px;font-weight:700;color:#999;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{border-right:1px solid #f8f8f8;border-bottom:1px solid #f8f8f8;padding:8px 6px;cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;align-items:flex-start;height:80px;}
.cal-day:hover{background:#f5f7ff;}
.cal-day.other-month .day-num{color:#ddd;}
.cal-day.today .day-num{background:#1e2a6d;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.cal-day.selected{background:#eef0fb;}
.day-num{font-size:13px;font-weight:600;color:#333;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cal-day:nth-child(7n+1) .day-num{color:#e53935;}
.cal-day:nth-child(7n) .day-num{color:#1565c0;}
.cal-day.other-month:nth-child(7n+1) .day-num,
.cal-day.other-month:nth-child(7n) .day-num{color:#ddd;}
.day-dots{display:flex;flex-direction:row;gap:3px;flex-wrap:wrap;margin-top:4px;}
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-math{background:#1565c0;}
.dot-eng{background:#2e7d32;}
.dot-all{background:#6a1b9a;}

.selected-day-events{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.selected-day-events h3{font-size:14px;font-weight:700;color:#1e2a6d;margin-bottom:12px;}
.event-row{padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px;color:#333;}
.event-row:last-child{border-bottom:none;}

.loading,.empty{text-align:center;padding:60px;color:#bbb;font-size:15px;}

@media(max-width:640px){
  .two-col{grid-template-columns:1fr;}
  .cal-day{height:54px;padding:6px 4px;}
  .day-dots{margin-top:2px;}
  .day-dot{width:6px;height:6px;}
  .selected-day-events{margin-top:10px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📅 그립학원 학사일정</h1>
  <a href="index.html">← 메인</a>
</div>

<div class="body">
  <div class="top-bar">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('all',this)">전체</button>
      <button class="tab-btn" onclick="setTab('split',this)">수학 / 영어</button>
      <button class="tab-btn" onclick="setTab('math',this)">수학만</button>
      <button class="tab-btn" onclick="setTab('eng',this)">영어만</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('list',this)">≡ 목록</button>
      <button class="view-btn" onclick="setView('calendar',this)">▦ 캘린더</button>
    </div>
  </div>

  <div id="listView"><p class="loading">일정 불러오는 중...</p></div>
  <div id="calView" style="display:none;">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <h2 id="calTitle"></h2>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="calendar">
      <div class="cal-header">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
    <div class="selected-day-events" id="selectedEvents" style="display:none;"></div>
  </div>
</div>

<script>
let allSchedules = [];
let currentTab = 'all';
let currentView = 'list';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;
const today = new Date(); today.setHours(0,0,0,0);

function isMath(s){ return s.target.includes('수학학부모'); }
function isEng(s){ return s.target.includes('영어학부모'); }
function isAll(s){ return s.target.includes('전체학원') || s.target.length === 0; }

function getFiltered(tab) {
  tab = tab || currentTab;
  if (tab === 'all') return allSchedules;
  if (tab === 'math') return allSchedules.filter(s => isMath(s) || isAll(s));
  if (tab === 'eng') return allSchedules.filter(s => isEng(s) || isAll(s));
  if (tab === 'split') return allSchedules;
  return allSchedules;
}

function tagHtml(s) {
  let t = '';
  (s.target||[]).forEach(n => t += `<span class="tag tag-${n}">${n}</span>`);
  if (s.category) t += `<span class="tag tag-cat">${s.category}</span>`;
  return t;
}

function itemHtml(s) {
  const d = new Date(s.date.start);
  const endD = s.date.end && s.date.end !== s.date.start ? new Date(s.date.end) : null;
  return `<div class="schedule-item">
    <div class="date-box">
      <div class="day">${d.getDate()}</div>
      <div class="mon">${d.getMonth()+1}월</div>
      ${endD ? `<div class="range">~${endD.getDate()}일</div>` : ''}
    </div>
    <div class="schedule-info">
      <div class="title">${s.title}</div>
      <div class="tags">${tagHtml(s)}</div>
    </div>
  </div>`;
}

function groupByMonth(items) {
  const groups = {};
  items.forEach(s => {
    const d = new Date(s.date.start);
    const key = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });
  return groups;
}

function sectionHtml(items, cls, label) {
  if (!items.length) return `<div><div class="section-head ${cls}">${label}</div><p class="empty-section">일정 없음</p></div>`;
  const groups = groupByMonth(items);
  let html = `<div><div class="section-head ${cls}">${label}</div>`;
  Object.entries(groups).forEach(([m, its]) => {
    html += `<div class="month-label">${m}</div>`;
    its.forEach(s => html += itemHtml(s));
  });
  return html + '</div>';
}

function renderList() {
  const el = document.getElementById('listView');
  if (currentTab === 'split') {
    const mathItems = allSchedules.filter(s => isMath(s) || isAll(s));
    const engItems = allSchedules.filter(s => isEng(s) || isAll(s));
    el.innerHTML = `<div class="two-col">
      ${sectionHtml(mathItems, 'math', '📐 수학 일정')}
      ${sectionHtml(engItems, 'eng', '📖 영어 일정')}
    </div>`;
    return;
  }
  const filtered = getFiltered();
  if (!filtered.length) { el.innerHTML = '<p class="empty">해당 일정이 없습니다.</p>'; return; }
  const groups = groupByMonth(filtered);
  let html = '';
  Object.entries(groups).forEach(([m, its]) => {
    html += `<div class="month-label">${m}</div>`;
    its.forEach(s => html += itemHtml(s));
  });
  el.innerHTML = html;
}

function setTab(t, btn) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentView === 'list') renderList();
  else renderCalendar();
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('listView').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('calView').style.display = v === 'calendar' ? 'block' : 'none';
  if (v === 'calendar') renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${calYear}년 ${calMonth+1}월`;
  const filtered = getFiltered();
  const eventMap = {};
  filtered.forEach(s => {
    const start = new Date(s.date.start);
    const end = s.date.end ? new Date(s.date.end) : start;
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if (!eventMap[key]) eventMap[key] = [];
      eventMap[key].push(s);
    }
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  let html = '';
  for (let i = firstDay - 1; i >= 0; i--)
    html += `<div class="cal-day other-month"><div class="day-num">${daysInPrev-i}</div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const isSel = selectedDate?.y===calYear && selectedDate?.m===calMonth && selectedDate?.d===d;
    const key = `${calYear}-${calMonth}-${d}`;
    const events = eventMap[key] || [];
    const dots = events.slice(0,5).map(e => {
      const cls = isMath(e) ? 'dot-math' : isEng(e) ? 'dot-eng' : 'dot-all';
      return `<div class="day-dot ${cls}"></div>`;
    }).join('');
    html += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${events.length?' has-event':''}" onclick="selectDay(${calYear},${calMonth},${d})">
      <div class="day-num">${d}</div>
      <div class="day-dots">${dots}</div>
    </div>`;
  }
  const cells = firstDay + daysInMonth;
  const remain = cells % 7 === 0 ? 0 : 7 - (cells % 7);
  for (let d = 1; d <= remain; d++)
    html += `<div class="cal-day other-month"><div class="day-num">${d}</div></div>`;

  document.getElementById('calBody').innerHTML = html;
  if (selectedDate) showSelectedEvents(filtered);
}

function selectDay(y, m, d) {
  selectedDate = {y, m, d};
  renderCalendar();
}

function showSelectedEvents(filtered) {
  const sel = new Date(selectedDate.y, selectedDate.m, selectedDate.d);
  const events = filtered.filter(s => {
    const start = new Date(s.date.start); start.setHours(0,0,0,0);
    const end = s.date.end ? new Date(s.date.end) : new Date(start); end.setHours(0,0,0,0);
    return sel >= start && sel <= end;
  });
  const el = document.getElementById('selectedEvents');
  if (!events.length) { el.style.display='none'; return; }
  el.style.display = 'block';
  el.innerHTML = `<h3>${selectedDate.y}년 ${selectedDate.m+1}월 ${selectedDate.d}일</h3>`
    + events.map(e => `<div class="event-row"><strong>${e.title}</strong> <span style="margin-left:6px">${tagHtml(e)}</span></div>`).join('');
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth=11; calYear--; }
  if (calMonth > 11) { calMonth=0; calYear++; }
  selectedDate = null;
  document.getElementById('selectedEvents').style.display='none';
  renderCalendar();
}

async function loadSchedules() {
  try {
    const res = await fetch('/api/schedule');
    allSchedules = await res.json();
    renderList();
  } catch(e) {
    document.getElementById('listView').innerHTML = '<p class="empty">일정을 불러올 수 없습니다.</p>';
  }
}

loadSchedules();
</script>

</body>
